name: asistencia_app
description: App de marcado de asistencia con geolocalización y Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Ubicación
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Utilidades
  intl: ^0.19.0
  csv: ^6.0.0
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
